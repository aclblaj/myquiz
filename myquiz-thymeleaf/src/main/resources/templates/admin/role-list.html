<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Role Management - MyQuiz</title>
    <link rel="stylesheet" type="text/css" th:href="@{/css/styles.css}">
</head>
<body>
    <div th:insert="~{fragments::menu}"></div>

    <div class="container list-page-compact">
        <h1 class="list-page-title">Role Management</h1>

        <div th:if="${error}" class="error-message" th:text="${error}"></div>

        <div th:if="${!menuPermissions['canManageRoles']}" class="error-message">
            You do not have permission to manage roles.
        </div>

        <div th:if="${menuPermissions['canManageRoles']}" class="actions">
            <a th:href="@{/admin/roles/new}" class="btn btn-new">➕ Add New Role</a>
        </div>

        <div class="table-container">
            <table class="styled-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Role Name</th>
                        <th>Description</th>
                        <th>Permissions</th>
                        <th>Created At</th>
                        <th th:if="${menuPermissions['canManageRoles']}">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="role : ${roles}">
                        <td th:text="${role.id}">1</td>
                        <td th:text="${role.name}">ADMINISTRATOR</td>
                        <td th:text="${role.description}">Full system access</td>
                        <td>
                            <span th:if="${role.permissionNames != null}"
                                  th:text="${#sets.size(role.permissionNames) + ' permissions'}">15 permissions</span>
                            <span th:unless="${role.permissionNames != null}">0 permissions</span>
                        </td>
                        <td th:text="${role.createdAt != null ? role.createdAt : 'N/A'}">2024-01-01</td>
                        <td th:if="${menuPermissions['canManageRoles']}" class="action-cell">
                            <a th:href="@{/admin/roles/{id}/edit(id=${role.id})}" class="btn btn-questionBank-edit">✏️ Edit</a>
                            <form th:action="@{/admin/roles/{id}/delete(id=${role.id})}" method="post"
                                  style="display:inline;" onsubmit="return confirm('Are you sure you want to delete this role?');">
                                <button type="submit" class="btn btn-delete">🗑️ Delete</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${roles == null or roles.isEmpty()}">
                        <td colspan="6" class="list-empty-message">No roles found</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="actions">
            <a th:href="@{/}" class="btn btn-outline">↩️ Back to Home</a>
        </div>
    </div>
</body>
</html>
