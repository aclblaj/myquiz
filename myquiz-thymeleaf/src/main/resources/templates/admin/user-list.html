<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management - MyQuiz</title>
    <link rel="stylesheet" type="text/css" th:href="@{/css/styles.css}">
</head>
<body>
    <div th:insert="~{fragments::menu}"></div>

    <div class="container list-page-compact">
        <h1 class="list-page-title">User Management</h1>

        <div th:if="${!menuPermissions['canManageUsers']}" class="error-message">
            You do not have permission to manage users.
        </div>

        <div th:if="${error}" class="error-message" th:text="${error}"></div>

        <div th:if="${menuPermissions['canManageUsers']}" class="table-container">
            <table class="styled-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Roles</th>
                        <th>Status</th>
                        <th>Created At</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="user : ${users}">
                        <td th:text="${user.id}">1</td>
                        <td th:text="${user.username}">admin</td>
                        <td th:text="${user.email}">admin@test.com</td>
                        <td>
                            <span th:each="role, iterStat : ${user.roleNames}"
                                  th:text="${role + (iterStat.last ? '' : ', ')}">ROLE</span>
                        </td>
                        <td>
                            <span th:if="${user.enabled}" class="status-active">Active</span>
                            <span th:unless="${user.enabled}" class="status-inactive">Disabled</span>
                        </td>
                        <td th:text="${user.createdAt != null ? user.createdAt : 'N/A'}">2024-01-01</td>
                        <td class="action-cell">
                            <a th:href="@{/admin/users/{id}/edit(id=${user.id})}" class="btn btn-questionBank-edit">✏️ Edit</a>
                            <form th:action="@{/admin/users/{id}/enabled(id=${user.id})}" method="post" style="display:inline;">
                                <input type="hidden" name="enabled" th:value="${!user.enabled}">
                                <button type="submit" class="btn btn-questions"
                                        th:text="${user.enabled ? '🚫 Disable' : '✅ Enable'}">Toggle</button>
                            </form>
                            <form th:action="@{/admin/users/{id}/delete(id=${user.id})}" method="post"
                                  style="display:inline;" onsubmit="return confirm('Are you sure you want to delete this user?');">
                                <button type="submit" class="btn btn-delete">🗑️ Delete</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${users == null or users.isEmpty()}">
                        <td colspan="7" class="list-empty-message">No users found</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="actions">
            <a th:href="@{/}" class="btn btn-outline">↩️ Back to Home</a>
        </div>
    </div>
</body>
</html>
