<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Question Bank Editor</title>
    <link rel="stylesheet" type="text/css" th:href="@{/css/styles.css}">
</head>
<body>

<div th:insert="~{fragments::menu}"></div>

<div class="container mt-3">
    <h2 th:text="${questionBank != null and questionBank.id != null ? '✏️ Edit Question Bank: ' + questionBank.name : '➕ Create New Question Bank'}">Question Bank Editor</h2>

    <div class="form-container">
        <h3 th:text="${questionBank != null and questionBank.id != null ? '✏️ Edit Question Bank Details' : '➕ Create New Question Bank'}">Question Bank Form</h3>
        <form th:action="@{/question-banks/save}" th:object="${questionBank}" method="post">
            <input type="hidden" th:field="*{id}" />

            <div class="form-grid">
                <div class="form-group">
                    <label for="name" class="form-label">Question Bank Name:</label>
                    <input type="text" id="name" th:field="*{name}" required class="form-input" placeholder="Enter question bank name" />
                </div>
                <div class="form-group">
                    <label for="course" class="form-label">Course:</label>
                    <select id="course" th:field="*{course}" required class="form-select">
                        <option value="">Select a course</option>
                        <option th:each="courseItem : ${courses}"
                                th:value="${courseItem.course}"
                                th:text="${courseItem.course}"
                                th:selected="${questionBank.course != null && questionBank.course == courseItem.course}">
                        </option>
                    </select>
                </div>
                <div class="form-grid-2col">
                    <div class="form-group">
                        <label for="studyYear" class="form-label">Study Year:</label>
                        <select id="studyYear" th:field="*{studyYear}" class="form-select">
                            <option value="">Not set</option>
                            <option th:each="studyYearItem : ${T(com.unitbv.myquiz.api.types.StudyYear).values()}"
                                    th:value="${studyYearItem.name()}"
                                    th:text="${studyYearItem.value}">
                            </option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="sourceFile" class="form-label">Source File:</label>
                        <input type="text" id="sourceFile" th:field="*{sourceFile}" class="form-input" placeholder="Enter source file path" />
                    </div>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-save" th:text="${questionBank != null and questionBank.id != null ? '💾 Update Question Bank' : '➕ Create Question Bank'}">Save Question Bank</button>
                <a th:href="@{/question-banks/}" class="btn btn-cancel">✖️ Cancel</a>
            </div>
        </form>
    </div>

    <div th:if="${questionBank != null and questionBank.id != null}" class="mt-4">
        <div class="form-container">
            <h3>📊 Question Bank Statistics</h3>
            <table class="detail-table">
                <tr>
                    <th scope="row">Multiple Choice Questions</th>
                    <td th:text="${questionBank.questionsMultichoice != null ? questionBank.questionsMultichoice.size() : 0}">0</td>
                </tr>
                <tr>
                    <th scope="row">True/False Questions</th>
                    <td th:text="${questionBank.questionsTruefalse != null ? questionBank.questionsTruefalse.size() : 0}">0</td>
                </tr>
                <tr>
                    <th scope="row">Total Questions</th>
                    <td th:text="${(questionBank.questionsMultichoice != null ? questionBank.questionsMultichoice.size() : 0) + (questionBank.questionsTruefalse != null ? questionBank.questionsTruefalse.size() : 0)}">0</td>
                </tr>
                <tr>
                    <th scope="row">Number of Authors</th>
                    <td th:text="${questionBank.noAuthors}">0</td>
                </tr>
            </table>

            <div class="form-actions">
                <a th:href="@{'/questions/' + ${questionBank.course}}" class="btn btn-questions">📚 Manage Questions</a>
                <a th:href="@{'/authors/?selectedCourse=' + ${questionBank.course}}" class="btn btn-authors">👥 View Authors</a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
