<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Question Bank Statistics</title>
    <link rel="stylesheet" type="text/css" th:href="@{/css/styles.css}">
</head>
<body>
<div th:insert="~{fragments/navigation::menu}"></div>

<div class="container mt-3 list-page-compact">
    <h2 class="list-page-title" th:text="'Statistics for Question Bank: ' + ${questionBank.name}">Statistics for Question Bank</h2>

    <div class="form-container" th:if="${questionBank != null && questionBank.id != null}">
        <h3>Question Bank Information</h3>
        <table class="detail-table">
            <tr><th scope="row">Question Bank ID</th><td th:text="${questionBank.id}">N/A</td></tr>
            <tr><th scope="row">Question Bank Name</th><td th:text="${questionBank.name}">N/A</td></tr>
            <tr><th scope="row">Course</th><td th:text="${questionBank.course}">N/A</td></tr>
        </table>

        <div class="form-actions" th:insert="~{fragments/forms :: question-bank-actions(${questionBank}, ${page}, ${pageSize != null ? pageSize : 10}, ${selectedCourseId != null ? selectedCourseId : questionBank.courseId})}"></div>
        <div class="form-actions">
            <a th:href="${backToQuestionBankUrl != null ? backToQuestionBankUrl : '/question-banks'}" class="btn btn-outline">↩️ Back to Question Banks</a>
        </div>
    </div>

    <table class="styled-table">
        <thead>
        <tr>
            <th>Author</th>
            <th>Multichoice Questions</th>
            <th>True/False Questions</th>
            <th>Errors</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="stat : ${authorStats}">
            <td th:text="${stat.authorName}"></td>
            <td th:text="${stat.mcCount}"></td>
            <td th:text="${stat.tfCount}"></td>
            <td th:text="${stat.errorCount}"></td>
            <td class="action-cell">
                <a th:href="@{/questions(authorId=${stat.authorId}, questionBankId=${questionBank.id}, courseId=${questionBank.courseId}, page=1, pageSize=${pageSize != null ? pageSize : 10})}" class="btn btn-questions">📚 Questions</a>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(authorStats)}" class="empty-row">
            <td colspan="5" class="list-empty-message">No statistics found for this question bank.</td>
        </tr>
        </tbody>
    </table>
</div>

<script>
function deleteQuiz(questionBankId) {
    if (confirm('Are you sure you want to delete this question bank? This will also delete all associated questions. This action cannot be undone.')) {
        window.location.href = '/question-banks/' + questionBankId + '/delete';
    }
}
</script>
</body>
</html>
