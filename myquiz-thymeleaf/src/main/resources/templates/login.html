<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
</head>
<body>

<div class="container auth-page">
    <div class="login-container auth-card">
        <h3 class="auth-title">🔐 Login</h3>
        <form th:action="@{/auth/login}" method="post" class="auth-form">
            <div th:if="${loginError}" class="error-message auth-message">Invalid username or password</div>
            <div class="form-grid auth-grid">
                <div class="form-group">
                    <label for="login-username" class="form-label">Username</label>
                    <input type="text" id="login-username" name="username" required class="form-input" />
                </div>
                <div class="form-group">
                    <label for="login-password" class="form-label">Password</label>
                    <input type="password" id="login-password" name="password" required class="form-input" />
                </div>
            </div>
            <div class="form-actions auth-actions">
                <button type="submit" class="btn btn-save auth-primary-btn">🔐 Login</button>
                <a th:href="@{/auth/register}" class="btn btn-new">📝 Register</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
