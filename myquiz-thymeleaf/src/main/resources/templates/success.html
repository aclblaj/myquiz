<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${messageType == 'error' ? 'Error' : 'Success'}">Result</title>
    <link rel="stylesheet" type="text/css" th:href="@{/css/styles.css}">
</head>
<body>

<div th:insert="~{fragments::menu}"></div>

<div class="container mt-3">
    <h2 th:text="${messageType == 'error' ? '❌ Error' : '✅ Success'}">Result</h2>

    <div class="form-container">
        <h3 th:text="${messageType == 'error' ? '⚠️ Operation Failed' : '✅ Operation Completed Successfully'}">Status</h3>

        <div th:class="${messageType == 'error' ? 'error-message page-result' : 'success-message page-result'}">
            <div class="result-icon" th:text="${messageType == 'error' ? '❌' : '✅'}">✅</div>
            <div class="result-text">
                <span th:text="${message}"></span>
            </div>
        </div>

        <div class="form-actions" style="justify-content: center; margin-top: 2rem;">
            <a href="javascript:history.back()" class="btn btn-info">↩️ Go Back</a>
            <a th:href="@{/}" class="btn btn-new">🏠 Home</a>
        </div>
    </div>
</div>

</body>
</html>
