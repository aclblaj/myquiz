<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Question Editor - True/False</title>
    <link rel="stylesheet" type="text/css" th:href="@{/css/styles.css}">
</head>
<body>
<div th:insert="~{fragments::menu}"></div>

<div class="container mt-3">
    <h2>📝 True/False Question Editor</h2>
    <div th:if="${successMessage}" class="alert" style="background: rgba(16, 185, 129, 0.1); color: #065f46; border-color: #6ee7b7;" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert" style="background: rgba(239, 68, 68, 0.1); color: #991b1b; border-color: #fca5a5;" th:text="${errorMessage}"></div>
    <div class="form-container">
        <h3>✏️ Edit True/False Question</h3>

        <!-- Validation Errors Box -->
        <div th:if="${question.errors != null and !#lists.isEmpty(question.errors)}"
             style="background:#fee2e2;border:2px solid #ef4444;border-radius:8px;padding:14px;margin-bottom:16px;">
            <h4 style="color:#991b1b;margin:0 0 8px;display:flex;align-items:center;gap:6px;">
                <span>⚠️</span> Validation Errors
            </h4>
            <table class="styled-table" style="margin:0;">
                <thead>
                    <tr>
                        <th style="background:#fecaca;color:#991b1b;width:60px;">Row</th>
                        <th style="background:#fecaca;color:#991b1b;">Error Description</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="error : ${question.errors}" class="data-row">
                        <td th:text="${error.row}"></td>
                        <td th:text="${error.description}"></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Duplicates Box -->
        <div th:if="${question.duplicates != null and !#lists.isEmpty(question.duplicates)}"
             style="background:#fef9c3;border:2px solid #f59e0b;border-radius:8px;padding:14px;margin-bottom:16px;">
            <h4 style="color:#92400e;margin:0 0 8px;display:flex;align-items:center;gap:6px;">
                <span>🔀</span> Duplicate Questions (<span th:text="${#lists.size(question.duplicates)}"></span>)
            </h4>
            <table class="styled-table" style="margin:0;">
                <thead>
                    <tr>
                        <th style="background:#fde68a;color:#92400e;width:60px;">Row</th>
                        <th style="background:#fde68a;color:#92400e;">Title</th>
                        <th style="background:#fde68a;color:#92400e;">Text</th>
                        <th style="background:#fde68a;color:#92400e;">Author</th>
                        <th style="background:#fde68a;color:#92400e;">Question Bank</th>
                        <th style="background:#fde68a;color:#92400e;width:80px;">Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="dup : ${question.duplicates}" class="data-row">
                        <td th:text="${dup.row}"></td>
                        <td th:text="${dup.title}"></td>
                        <td class="text-cell" th:text="${dup.text}"></td>
                        <td th:text="${dup.authorName}"></td>
                        <td th:text="${dup.questionBankName}"></td>
                        <td class="action-cell">
                            <a th:href="@{'/questions/' + ${dup.questionId}}" class="btn btn-info btn-small">👁️ View</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <form th:action="@{/questions}" method="post" th:object="${question}">
            <input type="hidden" th:field="*{id}" />
            <input type="hidden" name="questionType" value="TRUEFALSE" />
            <div class="form-grid">
                <div class="form-group">
                    <label for="tf-title" class="form-label">Question Title:</label>
                    <input type="text" id="tf-title" th:field="*{title}" placeholder="Enter question title" class="form-input" />
                </div>
                <div class="form-group">
                    <label for="tf-text" class="form-label">Question Text:</label>
                    <textarea id="tf-text" th:field="*{text}" placeholder="Enter question text" class="form-textarea"></textarea>
                </div>
                <div class="form-grid-2col">
                    <div class="form-group">
                        <label for="tf-chapter" class="form-label">Chapter:</label>
                        <input type="text" id="tf-chapter" th:field="*{chapter}" placeholder="Chapter number or name" class="form-input" />
                    </div>
                    <div class="form-group">
                        <label for="tf-authorName" class="form-label">Author Name:</label>
                        <input type="text" id="tf-authorName" th:field="*{authorName}" placeholder="Author name" class="form-input" />
                    </div>
                </div>
                <div class="form-grid-2col">
                    <div class="form-group">
                        <label for="tf-course" class="form-label">Course Name:</label>
                        <input type="text" id="tf-course" th:field="*{course}" placeholder="Course name" class="form-input" />
                    </div>
                    <div class="form-group">
                        <label for="tf-questionBankName" class="form-label">Question Bank Name:</label>
                        <input type="text" id="tf-questionBankName" th:field="*{questionBankName}" placeholder="Question bank name" class="form-input" />
                    </div>
                </div>
                <div class="form-group">
                    <label for="tf-questionBankId" class="form-label">Select Question Bank:</label>
                    <select id="tf-questionBankId" th:field="*{questionBankId}" class="form-select" onchange="syncQuestionBankMetadataTf(this)">
                        <option value="">-- Keep current / use course + questionBank name --</option>
                        <option th:each="questionBank : ${questionBanks}"
                                th:value="${questionBank.id}"
                                th:text="${questionBank.name + ' (' + questionBank.course + ')'}"
                                th:attr="data-course=${questionBank.course},data-questionBank-name=${questionBank.name}">
                            Question Bank
                        </option>
                    </select>
                </div>
                <fieldset class="form-fieldset">
                    <legend class="form-legend">True/False Weights (supports negative values)</legend>
                    <div class="form-grid-2col">
                        <div class="form-group">
                            <label for="weightTrue" class="form-label">Weight for True:</label>
                            <input type="number" id="weightTrue" th:field="*{weightTrue}" placeholder="e.g. 100" step="any" class="form-input" />
                        </div>
                        <div class="form-group">
                            <label for="weightFalse" class="form-label">Weight for False:</label>
                            <input type="number" id="weightFalse" th:field="*{weightFalse}" placeholder="e.g. -100" step="any" class="form-input" />
                        </div>
                    </div>
                </fieldset>
                <div class="form-group">
                    <label for="tf-response" class="form-label">Correct Answer:</label>
                    <select id="tf-response" th:field="*{response1}" class="form-select">
                        <option value="">Select correct answer</option>
                        <option value="True">True</option>
                        <option value="False">False</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label for="tf-answerReferenceText" class="form-label">Answer Reference:</label>
                <textarea id="tf-answerReferenceText" th:field="*{answerReferenceText}" maxlength="2000" placeholder="Reference details used to justify/correct the answer" class="form-textarea"></textarea>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-save">💾 Save</button>
                <a th:href="@{/questions(type='TRUEFALSE')}" class="btn btn-new">➕ New</a>
                <button type="button" class="btn btn-info" onclick="loadSampleQuestion()">🧪 Sample</button>
                <a th:if="${question.id != null}"
                   th:href="${questionDuplicatesUrl != null ? questionDuplicatesUrl : '/questions/' + question.id + '/duplicates'}" class="btn btn-questions">🔀 Duplicates</a>
                <a th:if="${question.id != null}"
                   th:href="${questionCorrectionUrl != null ? questionCorrectionUrl : '/questions/' + question.id + '/correction'}" class="btn btn-questionBank-edit">🤖 AI Correct</a>
                <span th:if="${question.id == null}" class="btn btn-outline disabled" title="Save the question first">🤖 AI Correct</span>
                <button type="button" class="btn btn-delete" onclick="deleteQuestion()" th:if="${question.id != null}">🗑️ Delete</button>
                <a th:href="${backToQuestionsUrl != null ? backToQuestionsUrl : '/questions'}" class="btn btn-cancel">✖️ Cancel</a>
            </div>
        </form>
    </div>
</div>
<script th:inline="javascript">
    const API_BASE = /*[[@{/}]]*/ '/';

    function deleteQuestion() {
        if (confirm('Are you sure you want to delete this question? This action cannot be undone.')) {
            const questionId = document.querySelector('input[name="id"]').value;
            if (questionId) {
                const form = document.createElement('form');
                form.method = 'POST';
                form.action = '/questions/' + questionId;
                const methodInput = document.createElement('input');
                methodInput.type = 'hidden';
                methodInput.name = '_method';
                methodInput.value = 'DELETE';
                form.appendChild(methodInput);
                document.body.appendChild(form);
                form.submit();
            }
        }
    }

    async function loadSampleQuestion() {
        try {
            const resp = await fetch('/questions/sample?type=TRUEFALSE', {
                headers: { 'Accept': 'application/json' }
            });
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            const q = await resp.json();
            document.getElementById('tf-title').value = q.title || '';
            document.getElementById('tf-text').value = q.text || '';
            document.getElementById('tf-answerReferenceText').value = q.answerReferenceText || '';
            document.getElementById('tf-chapter').value = q.chapter || '';
            document.getElementById('tf-authorName').value = q.authorName || '';
            document.getElementById('tf-course').value = q.course || '';
            document.getElementById('tf-questionBankName').value = q.questionBankName || '';
            document.getElementById('weightTrue').value = q.weightTrue != null ? q.weightTrue : '';
            document.getElementById('weightFalse').value = q.weightFalse != null ? q.weightFalse : '';
            document.getElementById('tf-response').value = q.response1 || '';
        } catch (e) {
            console.error('Failed to load sample:', e);
            // Fallback to inline values
            document.getElementById('tf-title').value = 'SQL Statement Usage';
            document.getElementById('tf-text').value = 'The SQL statement SELECT is used to retrieve data from a table.';
            document.getElementById('tf-answerReferenceText').value = '';
            document.getElementById('tf-chapter').value = 'Databases';
            document.getElementById('tf-authorName').value = 'DB Author';
            document.getElementById('tf-course').value = 'Database Systems';
            document.getElementById('tf-questionBankName').value = 'SQL Fundamentals';
            document.getElementById('weightTrue').value = '100';
            document.getElementById('weightFalse').value = '-100';
            document.getElementById('tf-response').value = 'True';
        }
    }

    function syncQuestionBankMetadataTf(selectElement) {
        if (!selectElement) {
            return;
        }
        const selectedOption = selectElement.options[selectElement.selectedIndex];
        if (!selectedOption || !selectedOption.value) {
            return;
        }
        const courseField = document.getElementById('tf-course');
        const questionBankNameField = document.getElementById('tf-questionBankName');
        if (courseField && selectedOption.dataset.course) {
            courseField.value = selectedOption.dataset.course;
        }
        if (questionBankNameField && selectedOption.dataset.questionBankName) {
            questionBankNameField.value = selectedOption.dataset.questionBankName;
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        syncQuestionBankMetadataTf(document.getElementById('tf-questionBankId'));
    });
</script>
</body>
</html>
