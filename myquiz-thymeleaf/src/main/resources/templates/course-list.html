<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Courses List</title>
    <link rel="stylesheet" type="text/css" th:href="@{/css/styles.css}">
</head>
<body>

<div th:insert="~{fragments/navigation::menu}"></div>

<div class="container mt-3 list-page-compact">
    <h2 class="list-page-title">Courses</h2>

    <div th:replace="~{fragments/forms :: recompute-feedback(${message})}"></div>

    <div th:if="${message != null and !#strings.contains(message, 'Recompute started:')}" class="list-success-message" th:text="${message}"></div>

    <!-- Search Filter Section -->
    <div class="searchfilter">
        <form method="post" th:action="@{/courses/filter}" class="searchfilter-form">
            <div class="list-filter-field">
                <label for="courseFilter" class="searchfilter-label">Course</label>
                <select id="courseFilter" name="selectedCourseId" class="searchfilter-select">
                    <option value="">All Courses</option>
                    <option th:each="course : ${courses}"
                            th:value="${course.id}"
                            th:text="${course.course}"
                            th:selected="${course.id} == ${selectedCourseId}"></option>
                </select>
            </div>
            <div class="list-filter-field">
                <label for="yearFilter" class="searchfilter-label">University Year</label>
                <select id="yearFilter" name="selectedYear" class="searchfilter-select">
                    <option value="">All Years</option>
                    <option th:each="year : ${years}"
                            th:value="${year}"
                            th:text="${year}"
                            th:selected="${year} == ${selectedYear}"></option>
                </select>
            </div>
            <div class="list-filter-field">
                <label for="pageSize" class="searchfilter-label">Page Size</label>
                <select id="pageSize" name="pageSize" class="searchfilter-select">
                    <option th:selected="${pageSize == 5}" value="5">5</option>
                    <option th:selected="${pageSize == 10}" value="10">10</option>
                    <option th:selected="${pageSize == 20}" value="20">20</option>
                    <option th:selected="${pageSize == 50}" value="50">50</option>
                </select>
            </div>
            <div class="list-filter-field">
                <label for="currentPage" class="searchfilter-label">Page</label>
                <input type="number" id="currentPage" name="page"
                       th:value="${currentPage != null ? currentPage : 1}"
                       min="1"
                       class="searchfilter-select searchfilter-select-small" />
            </div>
            <button type="submit" class="btn-filter">🔍 Filter</button>
        </form>
    </div>

    <!-- Error Message -->
    <div th:if="${errorMessage}" class="list-error-message" th:text="${errorMessage}"></div>

    <!-- Styled Table -->
    <table class="styled-table">
        <thead>
        <tr>
            <th>Id</th>
            <th>Course Name</th>
            <th>Description</th>
            <th>University Year</th>
            <th>Semester</th>
            <th>Question Banks</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="course : ${courses}" class="data-row">
            <td>
                <a th:if="${course.id != null}" th:href="@{'/courses/' + ${course.id}}" th:text="${course.id}">1</a>
                <span th:if="${course.id == null}">-</span>
            </td>
            <td th:text="${course.course}"></td>
            <td th:text="${course.description}"></td>
            <td th:text="${course.universityYear}"></td>
            <td th:text="${course.semester}"></td>
            <td th:text="${course.questionBankCount}"></td>
            <td>
                <div th:replace="~{fragments/forms :: course-actions(${course}, ${selectedCourseId}, ${selectedYear}, ${currentPage}, ${pageSize}, 'action-cell', ${false})}"></div>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(courses)}" class="empty-row">
            <td colspan="7" class="list-empty-message">No courses found for the selected criteria</td>
        </tr>
        </tbody>
    </table>

    <!-- Pagination Controls -->
    <div class="pagination-controls" th:if="${totalPages != null && totalPages > 1}">
        <div class="list-pagination-row">
            <!-- First Button -->
            <a th:if="${currentPage != null && currentPage > 1}"
               th:href="@{/courses(selectedCourseId=${selectedCourseId}, selectedYear=${selectedYear}, page=1, pageSize=${pageSize})}"
               class="btn btn-outline">⏮️ First</a>
            <span th:if="${currentPage == null || currentPage <= 1}" class="btn btn-outline disabled">⏮️ First</span>

            <!-- Previous Button -->
            <a th:if="${currentPage != null && currentPage > 1}"
               th:href="@{/courses(selectedCourseId=${selectedCourseId}, selectedYear=${selectedYear}, page=${currentPage - 1}, pageSize=${pageSize})}"
               class="btn btn-outline">◀️ Previous</a>
            <span th:if="${currentPage == null || currentPage <= 1}" class="btn btn-outline disabled">◀️ Previous</span>

            <span class="list-page-indicator">Page <span th:text="${currentPage != null ? currentPage : 1}"></span> of <span th:text="${totalPages}"></span></span>

            <!-- Next Button -->
            <a th:if="${currentPage != null && currentPage < totalPages}"
               th:href="@{/courses(selectedCourseId=${selectedCourseId}, selectedYear=${selectedYear}, page=${currentPage + 1}, pageSize=${pageSize})}"
               class="btn btn-outline">▶️ Next</a>
            <span th:if="${currentPage == null || currentPage >= totalPages}" class="btn btn-outline disabled">▶️ Next</span>

            <!-- Last Button -->
            <a th:if="${currentPage != null && currentPage < totalPages}"
               th:href="@{/courses(selectedCourseId=${selectedCourseId}, selectedYear=${selectedYear}, page=${totalPages}, pageSize=${pageSize})}"
               class="btn btn-outline">⏭️ Last</a>
            <span th:if="${currentPage == null || currentPage >= totalPages}" class="btn btn-outline disabled">⏭️ Last</span>
        </div>
    </div>

    <!-- Total Elements -->
    <div class="total-elements" th:if="${totalElements != null}">
        Total: <span th:text="${totalElements}"></span> course(s) found
    </div>
</div>

<script th:src="@{/js/course-actions.js}"></script>

</body>
</html>
