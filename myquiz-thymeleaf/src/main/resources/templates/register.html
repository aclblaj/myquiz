<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
</head>
<body>

<div class="container auth-page">
    <div class="register-container auth-card">
        <h3 class="auth-title">📝 Register</h3>
        <form th:action="@{/auth/register}" method="post" class="auth-form">
            <div th:if="${registrationSuccess}" class="success-message auth-message" th:text="${registrationMessage}">Registration successful. Your account is pending activation by an administrator.</div>
            <div th:if="${registerError}" class="error-message auth-message" th:text="${registerErrorMsg}">Registration failed. Try again.</div>
            <div class="form-grid auth-grid">
                <div class="form-group">
                    <label for="reg-username" class="form-label">Username</label>
                    <input type="text" id="reg-username" name="username" required class="form-input" />
                </div>
                <div class="form-group">
                    <label for="reg-email" class="form-label">Email</label>
                    <input type="email" id="reg-email" name="email" required class="form-input" />
                </div>
                <div class="form-group">
                    <label for="reg-password" class="form-label">Password</label>
                    <input type="password" id="reg-password" name="password" required class="form-input" />
                </div>
            </div>
            <div class="form-actions auth-actions">
                <button type="submit" class="btn btn-save auth-primary-btn">📝 Register</button>
                <a th:href="@{/auth/login}" class="btn btn-new">🔐 Login</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
