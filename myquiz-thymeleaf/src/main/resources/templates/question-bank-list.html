<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Question Banks</title>
    <link rel="stylesheet" type="text/css" th:href="@{/css/styles.css}">
</head>
<body>

<div th:insert="~{fragments::menu}"></div>

<div class="container mt-3 list-page-compact">
    <h2 class="list-page-title">Question Banks</h2>

    <div th:if="${errorMsg != null}" class="alert alert-warning" th:text="${errorMsg}"></div>
    <div th:if="${message != null}" class="alert alert-success" th:text="${message}"></div>

    <!-- Search Filter Section -->
    <div class="searchfilter">
        <form method="get" th:action="@{/question-banks}" class="searchfilter-form">
            <div class="list-filter-field">
                <label for="courseFilter" class="searchfilter-label">Course</label>
                <select id="courseFilter" name="courseId" class="searchfilter-select">
                    <option value="">All Courses</option>
                    <option th:each="courseItem : ${courses}"
                            th:value="${courseItem.id}"
                            th:text="${courseItem.course}"
                            th:selected="${selectedCourseId != null && selectedCourseId == courseItem.id}">
                    </option>
                </select>
            </div>
            <div class="list-filter-field">
                <label for="pageSize" class="searchfilter-label">Page Size</label>
                <select id="pageSize" name="pageSize" class="searchfilter-select">
                    <option th:selected="${questionBankFilter != null && questionBankFilter.pageSize == 5}" value="5">5</option>
                    <option th:selected="${questionBankFilter != null && questionBankFilter.pageSize == 10}" value="10">10</option>
                    <option th:selected="${questionBankFilter != null && questionBankFilter.pageSize == 20}" value="20">20</option>
                    <option th:selected="${questionBankFilter != null && questionBankFilter.pageSize == 50}" value="50">50</option>
                </select>
            </div>
            <div class="list-filter-field">
                <label for="currentPage" class="searchfilter-label">Page</label>
                <input type="number" id="currentPage" name="page"
                       th:value="${questionBankFilter != null ? questionBankFilter.page : 1}"
                       min="1"
                       class="searchfilter-select searchfilter-select-small" />
            </div>
            <button type="submit" class="btn-filter">Filter</button>
        </form>
    </div>

    <!-- Styled Table -->
    <table class="styled-table">
        <thead>
        <tr>
            <th>Id</th>
            <th>Name</th>
            <th>Course</th>
            <th>Study Year</th>
            <th>MC</th>
            <th>TF</th>
            <th>Total</th>
            <th>Authors</th>
            <th>Duplicates</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${questionBankFilter != null}" th:each="questionBank : ${questionBankFilter.questionBanks}" class="data-row">
            <td th:text="${questionBank.id}"></td>
            <td th:text="${questionBank.name}"></td>
            <td th:text="${questionBank.course}"></td>
            <td th:text="${questionBank.studyYear != null ? questionBank.studyYear.value : '-'}"></td>
            <td th:text="${questionBank.mcQuestionsCount}"></td>
            <td th:text="${questionBank.tfQuestionsCount}"></td>
            <td th:text="${questionBank.mcQuestionsCount + questionBank.tfQuestionsCount}"></td>
            <td th:text="${questionBank.noAuthors}"></td>
            <td th:text="${questionBank.numberOfDuplicates != null ? questionBank.numberOfDuplicates : 0}"></td>
            <td class="action-cell">
                <a th:href="@{/questions(page=1, pageSize=${questionBankFilter != null && questionBankFilter.pageSize != null ? questionBankFilter.pageSize : 10}, courseId=${questionBank.courseId}, questionBankId=${questionBank.id})}" class="btn btn-questions" title="Manage Questions">📚 Questions</a>
                <a th:href="@{/question-banks/{id}(id=${questionBank.id}, page=${questionBankFilter.page}, pageSize=${questionBankFilter.pageSize}, courseId=${selectedCourseId})}" class="btn btn-info" title="Question Bank View">👁️ View</a>
                <a th:href="@{/question-banks/{id}/extended(id=${questionBank.id}, page=${questionBankFilter.page}, pageSize=${questionBankFilter.pageSize}, courseId=${selectedCourseId})}" class="btn btn-new" title="Details View">📋 Details</a>
                <a th:href="@{'/question-banks/edit/' + ${questionBank.id}}" class="btn btn-questionBank-edit" title="Edit Question Bank">✏️ Edit</a>
                <button th:onclick="|deleteQuiz(${questionBank.id})|" class="btn btn-delete" title="Delete Question Bank">🗑️ Delete</button>
                <a th:href="@{'/question-banks/' + ${questionBank.id} + '/export-mc'}" class="btn btn-new" target="_blank" title="Export MC to CSV">MC Export CSV</a>
                <a th:href="@{'/question-banks/' + ${questionBank.id} + '/export-tf'}" class="btn btn-new" target="_blank" title="Export TF to CSV">TF Export CSV</a>
                <a th:if="${menuPermissions['canExportXml']}" th:href="@{'/question-banks/' + ${questionBank.id} + '/export-xml'}" class="btn btn-export-xml" target="_blank" title="Export as XML">Export XML</a>
                <a th:href="@{'/authors/course/' + ${questionBank.course} + '/page/1'}" class="btn btn-authors" title="View Authors">👥 Authors</a>
            </td>
        </tr>
        <tr th:if="${questionBankFilter == null || #lists.isEmpty(questionBankFilter.questionBanks)}" class="empty-row">
            <td colspan="9" class="list-empty-message">No question banks found for the selected criteria</td>
        </tr>
        </tbody>
    </table>

    <!-- Pagination Controls -->
    <div class="pagination-controls" th:if="${questionBankFilter != null && questionBankFilter.totalPages > 1}">
        <!-- First Button -->
        <a th:if="${questionBankFilter.page > 1}"
           th:href="@{/question-banks(courseId=${selectedCourseId}, page=1, pageSize=${questionBankFilter.pageSize})}"
           class="btn btn-outline" title="First Page">⏮️</a>
        <span th:if="${questionBankFilter.page <= 1}" class="btn btn-outline disabled">⏮️</span>

        <!-- Previous Button -->
        <a th:if="${questionBankFilter.page > 1}"
           th:href="@{/question-banks(courseId=${selectedCourseId}, page=${questionBankFilter.page - 1}, pageSize=${questionBankFilter.pageSize})}"
           class="btn btn-outline" title="Previous Page">◀️</a>
        <span th:if="${questionBankFilter.page <= 1}" class="btn btn-outline disabled">◀️</span>

        <span class="list-page-indicator">Page <span th:text="${questionBankFilter.page}"></span> of <span th:text="${questionBankFilter.totalPages}"></span></span>

        <!-- Next Button -->
        <a th:if="${questionBankFilter.page < questionBankFilter.totalPages}"
           th:href="@{/question-banks(courseId=${selectedCourseId}, page=${questionBankFilter.page + 1}, pageSize=${questionBankFilter.pageSize})}"
           class="btn btn-outline" title="Next Page">▶️</a>
        <span th:if="${questionBankFilter.page >= questionBankFilter.totalPages}" class="btn btn-outline disabled">▶️</span>

        <!-- Last Button -->
        <a th:if="${questionBankFilter.page < questionBankFilter.totalPages}"
           th:href="@{/question-banks(courseId=${selectedCourseId}, page=${questionBankFilter.totalPages}, pageSize=${questionBankFilter.pageSize})}"
           class="btn btn-outline" title="Last Page">⏭️</a>
        <span th:if="${questionBankFilter.page >= questionBankFilter.totalPages}" class="btn btn-outline disabled">⏭️</span>
    </div>

    <!-- Total Elements -->
    <div class="total-elements" th:if="${questionBankFilter != null}">
        Total: <span th:text="${questionBankFilter.totalElements}"></span> question bank(s) found
    </div>
</div>

<script>
function deleteQuiz(questionBankId) {
    if (confirm('Are you sure you want to delete this question bank? This will also delete all associated questions. This action cannot be undone.')) {
        window.location.href = '/question-banks/' + questionBankId + '/delete';
    }
}
</script>

</body>
</html>
