<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Question Details</title>
    <link rel="stylesheet" type="text/css" th:href="@{/css/styles.css}">
</head>
<body>
<div th:insert="~{fragments/navigation::menu}"></div>

<div class="container mt-3 list-page-compact">
    <h2 class="list-page-title">📝 Question Details</h2>

    <div th:if="${question != null}" class="form-container">
        <h3>Question Information</h3>
        <table class="detail-table">
            <tr>
                <th scope="row">ID</th>
                <td th:text="${question.id}"></td>
            </tr>
            <tr>
                <th scope="row">Type</th>
                <td th:text="${question.type}"></td>
            </tr>
            <tr>
                <th scope="row">Title</th>
                <td th:text="${question.title}"></td>
            </tr>
            <tr>
                <th scope="row">Chapter</th>
                <td th:text="${question.chapter}"></td>
            </tr>
            <tr>
                <th scope="row">Course</th>
                <td th:text="${question.course}"></td>
            </tr>
            <tr>
                <th scope="row">Author</th>
                <td>
                    <a th:if="${question.author != null and question.author.id != null}"
                       th:href="@{/authors/{id}/details(id=${question.author.id})}"
                       th:text="${question.author.name}"></a>
                    <span th:if="${question.author == null or question.author.id == null}"
                          th:text="${question.author != null ? question.author.name : ''}"></span>
                </td>
            </tr>
            <tr>
                <th scope="row">Question Bank</th>
                <td th:text="${question.questionBankName}"></td>
            </tr>
            <tr>
                <th scope="row">Text</th>
                <td th:text="${question.text}"></td>
            </tr>
            <tr th:if="${question.type == 'MULTICHOICE'}">
                <th scope="row">Responses</th>
                <td>
                    <ul>
                        <li th:text="${question.response1}"></li>
                        <li th:text="${question.response2}"></li>
                        <li th:text="${question.response3}"></li>
                        <li th:text="${question.response4}"></li>
                    </ul>
                </td>
            </tr>
            <tr th:if="${question.type == 'TRUEFALSE'}">
                <th scope="row">True/False</th>
                <td th:text="${question.response1}"></td>
            </tr>
            <tr>
                <th scope="row">Answers reference</th>
                <td th:text="${question.answerReferenceText}"></td>
            </tr>
        </table>

        <div class="form-actions"
             th:insert="~{fragments/forms :: question-actions(${question}, ${currentPage}, ${pageSize}, ${selectedCourseId}, ${selectedAuthorId}, ${selectedQuestionBankId}, ${selectedType})}"></div>
        <div class="form-actions">
            <a th:href="${backToQuestionsUrl != null ? backToQuestionsUrl : '/questions'}" class="btn btn-outline">↩️ Back to Questions</a>
        </div>
    </div>

    <div th:if="${question == null}" class="alert">
        <p>No question found.</p>
        <a th:href="${backToQuestionsUrl != null ? backToQuestionsUrl : '/questions'}" class="btn btn-outline">↩️
            Back to Questions</a>
    </div>
</div>

<script>
function deleteQuestion(questionId) {
    if (confirm('Are you sure you want to delete this question? This action cannot be undone.')) {
        const form = document.createElement('form');
        form.method = 'POST';
        form.action = '/questions/' + questionId;
        const methodInput = document.createElement('input');
        methodInput.type = 'hidden';
        methodInput.name = '_method';
        methodInput.value = 'DELETE';
        form.appendChild(methodInput);
        document.body.appendChild(form);
        form.submit();
    }
}
</script>
</body>
</html>
