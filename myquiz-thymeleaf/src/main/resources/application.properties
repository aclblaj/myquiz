spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
spring.mvc.hiddenmethod.filter.enabled=true

# UTF-8 Encoding Configuration for Unicode Support
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

logging.level.root=DEBUG
logging.level.com.unitbv.myquiz=DEBUG
logging.level.org.springframework=DEBUG
logging.level.org.hibernate=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.com.unitbv.myquiz.thy.interceptor.RequestLoggingInterceptor=DEBUG

# Suppress harmless Tomcat connection errors (client disconnects)
logging.level.org.apache.coyote.http11.Http11Processor=INFO
logging.level.org.apache.tomcat.util.net=INFO

# Ollama AI Integration Configuration
ollama.api.url=http://localhost:11434
ollama.default.model=llama3

# Swagger UI URL (points to myquiz-app service)
swagger.ui.url=${SWAGGER_UI_URL:http://localhost:8082/swagger-ui.html}

