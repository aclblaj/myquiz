spring.application.name=myquiz-app

# UTF-8 Encoding Configuration for Unicode Support
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

spring.jpa.hibernate.ddl-auto=update
spring.sql.init.platform=postgres
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/myquiz?sslmode=disable}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:1q2w3e}
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.mode=HTML

logging.level.root=DEBUG
logging.level.com.unitbv.myquiz=DEBUG
logging.level.com.unitbv.myquiz.app=DEBUG
logging.level.org.springframework=DEBUG
logging.level.org.hibernate=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG

upload.dir=C:\\Temp
jakarta.persistence.jdbc.url = jdbc:postgresql://192.168.22.100:5432/myquiz?sslmode=disable
spring.jpa.open-in-view=false

# Task executor configuration
myquiz.tasks.read-and-parse.core-pool-size=10
myquiz.tasks.read-and-parse.max-pool-size=25
myquiz.tasks.read-and-parse.wait-for-tasks-to-complete-on-shutdown=true
myquiz.tasks.read-and-parse.await-termination-seconds=120
myquiz.tasks.duplicate-check.core-pool-size=20
myquiz.tasks.duplicate-check.max-pool-size=20
myquiz.tasks.duplicate-check.queue-capacity=500
myquiz.tasks.duplicate-check.wait-for-tasks-to-complete-on-shutdown=true
myquiz.tasks.duplicate-check.await-termination-seconds=180

# Ollama AI Integration Configuration
ollama.api.url=http://localhost:11434
ollama.default.model=llama3
ollama.timeout.seconds=120

# Logging configuration for Ollama service
logging.level.com.unitbv.myquiz.services.impl.OllamaServiceImpl=INFO
logging.level.com.unitbv.myquiz.controller.OllamaController=INFO

# OpenAPI/Swagger Configuration
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.packages-to-scan=com.unitbv.myquiz.app.controller
springdoc.show-actuator=false

# OpenAPI Configuration for Centralized API Documentation
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.persistAuthorization=true

# Custom OpenAPI properties
server.host=localhost
api.version=1.0.0
api.title=MyQuiz API
api.description=Comprehensive quiz management system with AI integration

spring.servlet.multipart.max-file-size=150MB
spring.servlet.multipart.max-request-size=150MB

# JWT Configuration
jwt.secret=${JWT_SECRET:4a36d554f7299bd3d7080a324a3b3e68f19fba04a26c84ed97c5260bbb132996}

# Duplicate Comparison Strategy (default: string-equality)
myquiz.duplicates.similarity.algorithm=string-equality
